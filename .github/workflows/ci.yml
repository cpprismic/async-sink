name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (C++${{ matrix.std }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        std: [17, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_STANDARD=${{ matrix.std }} \
            -DLOGGER_BUILD_TESTS=ON \
            -DLOGGER_BUILD_DEMO=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure
